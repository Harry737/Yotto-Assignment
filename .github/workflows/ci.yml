name: Build, Push & Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'apps/website/**'
      - 'helm/tenant-website/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/tenant-website

jobs:
  build-and-push:
    runs-on: self-hosted
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/website
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Built and pushed image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"

  update-helm-values:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm values with new image tag
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"

          # Update each tenant's values file
          for tenant in user1 user2 user3; do
            sed -i "s|tag: \".*\"|tag: \"$IMAGE_TAG\"|" helm/tenant-website/values-${tenant}.yaml
            echo "✓ Updated values-${tenant}.yaml with tag: $IMAGE_TAG"
          done

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add helm/tenant-website/values-*.yaml

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update image tag to ${{ needs.build-and-push.outputs.image_tag }}"
            git push origin master
            echo "✓ Pushed updated Helm values"
          fi

  verify-deployment:
    needs: update-helm-values
    runs-on: self-hosted
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment status
        run: |
          echo "Waiting for ArgoCD to sync..."
          sleep 10

          for tenant in user1 user2 user3; do
            echo "Checking deployment for $tenant..."
            kubectl rollout status deployment/${tenant}-website-tenant-website -n ${tenant} --timeout=120s || true
          done

      - name: Check pod status
        run: |
          echo "Pod status:"
          kubectl get pods -n user1 -n user2 -n user3 -o wide || true

      - name: Publish deployment event
        run: |
          cd kafka/consumer
          npm ci 2>/dev/null || true
          node notify.js \
            --event DeploymentSucceeded \
            --tenant multi-tenant \
            --version "${{ needs.build-and-push.outputs.image_tag }}"
        env:
          KAFKA_BROKER: "172.17.0.1:9092"
        continue-on-error: true

  rollback-on-failure:
    needs: [build-and-push, update-helm-values]
    runs-on: self-hosted
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback deployments
        run: |
          echo "Deployment failed, rolling back..."

          for tenant in user1 user2 user3; do
            echo "Rolling back $tenant..."
            kubectl rollout undo deployment/${tenant}-website-tenant-website -n ${tenant} || true
          done

      - name: Publish rollback event
        run: |
          cd kafka/consumer
          npm ci 2>/dev/null || true
          node notify.js \
            --event DeploymentRolledBack \
            --tenant multi-tenant \
            --version "${{ needs.build-and-push.outputs.image_tag }}"
        env:
          KAFKA_BROKER: "172.17.0.1:9092"
        continue-on-error: true

