apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tenant-website.fullname" . }}
  labels:
    {{- include "tenant-website.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tenant-website.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenant-website.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: TENANT_NAME
          value: {{ .Values.tenantName | quote }}
        - name: DOMAIN
          value: {{ .Values.domain | quote }}
        - name: KAFKA_BROKER
          value: {{ .Values.kafka.broker | quote }}
        - name: VERSION
          value: {{ .Values.image.tag | quote }}

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu | quote }}
            memory: {{ .Values.resources.requests.memory | quote }}
          limits:
            cpu: {{ .Values.resources.limits.cpu | quote }}
            memory: {{ .Values.resources.limits.memory | quote }}

        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp

      securityContext:
        fsGroup: 1000

      volumes:
      - name: tmp
        emptyDir: {}
