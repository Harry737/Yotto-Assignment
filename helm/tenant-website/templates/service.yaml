apiVersion: v1
kind: Service
metadata:
  name: {{ include "tenant-website.fullname" . }}
  labels:
    {{- include "tenant-website.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "tenant-website.selectorLabels" . | nindent 4 }}
