apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tenant-website.fullname" . }}-netpol
  labels:
    {{- include "tenant-website.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tenant-website.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from ingress-nginx
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  # Allow from within same namespace (for monitoring, etc)
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3000
  egress:
  # Allow all egress (Kafka, DNS, etc)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  # Allow to Kafka broker
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 9092
    - protocol: TCP
      port: 29092
  # Allow DNS
  - to:
    - podSelector: {}
    ports:
    - protocol: UDP
      port: 53
